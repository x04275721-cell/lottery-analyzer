<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩票智能分析 - 多算法交叉验证</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px;
        }
        
        .container { max-width: 600px; margin: 0 auto; }
        
        header {
            text-align: center;
            margin-bottom: 24px;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .countdown {
            font-size: 14px;
            color: var(--text-muted);
        }
        
        .countdown span { color: var(--secondary); font-weight: bold; }
        
        .countdown-area { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .lottery-status { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: rgba(99, 102, 241, 0.1); border-radius: 8px; }
        .lottery-status.closed { background: rgba(16, 185, 129, 0.1); }
        .lottery-name { font-size: 14px; font-weight: bold; }
        .lottery-name.pl3 { color: var(--primary); }
        .lottery-name.fc3d { color: var(--secondary); }
        .lottery-countdown { font-size: 14px; font-weight: bold; }
        .lottery-countdown.open { color: var(--success); }
        .lottery-countdown.closed { color: var(--success); }
        .lottery-countdown.waiting { color: var(--secondary); }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            background: var(--card);
            border: none;
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .tab.active { background: var(--primary); color: white; }
        
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        
        .card-title {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: var(--primary);
            border-radius: 2px;
        }
        
        /* 精选推荐 */
        .selected {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .num-box {
            flex: 1;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .num-box:hover { transform: scale(1.05); }
        .num-box span { font-size: 28px; font-weight: bold; letter-spacing: 4px; color: white; }
        .num-box .label { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 4px; }
        
        /* 备选 */
        .backup {
            display: flex;
            gap: 8px;
        }
        
        .backup-item {
            flex: 1;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .backup-item:hover { background: rgba(99, 102, 241, 0.2); border-color: var(--primary); }
        .backup-item span { font-size: 20px; font-weight: bold; letter-spacing: 2px; }
        
        /* 胆码 */
        .danma { display: flex; gap: 16px; margin-bottom: 16px; }
        .danma-item { flex: 1; text-align: center; }
        .danma-item .label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
        .danma-item .num {
            font-size: 24px;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 8px;
            display: inline-block;
        }
        
        .gold { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1e293b; }
        .silver { background: linear-gradient(135deg, #94a3b8, #64748b); color: #1e293b; }
        
        .double-dan {
            text-align: center;
            padding: 8px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }
        
        .double-dan span { color: var(--secondary); font-weight: bold; }
        
        /* 和值 */
        .sum-list { display: flex; gap: 8px; }
        .sum-item { flex: 1; text-align: center; padding: 8px; background: rgba(16, 185, 129, 0.1); border-radius: 6px; font-size: 14px; }
        .sum-item span { color: var(--success); font-weight: bold; }
        
        /* 命中率统计 */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .stat-item { text-align: center; padding: 16px; background: rgba(99, 102, 241, 0.1); border-radius: 8px; }
        .stat-item .value { font-size: 24px; font-weight: bold; color: var(--primary); }
        .stat-item .label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .stat-item.hit .value { color: var(--success); }
        .stat-item.hit-2 .value { color: var(--secondary); }
        
        /* 历史记录 */
        .history-list { max-height: 400px; overflow-y: auto; }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
        }
        
        .history-item:last-child { border-bottom: none; }
        .history-item.hit { background: rgba(16, 185, 129, 0.1); }
        .history-item.partial { background: rgba(245, 158, 11, 0.1); }
        
        .history-period { color: var(--text-muted); font-size: 12px; }
        .history-recommend { letter-spacing: 2px; margin-top: 4px; }
        .history-draw { font-weight: bold; letter-spacing: 4px; }
        .history-hit { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
        .history-hit.direct { background: var(--success); color: white; }
        .history-hit.group { background: var(--success); color: white; }
        .history-hit.partial { background: var(--secondary); color: #1e293b; }
        .history-hit.miss { background: rgba(148, 163, 184, 0.3); color: var(--text-muted); }
        
        /* 权重滑块 */
        .weight-sliders { display: flex; flex-direction: column; gap: 16px; }
        .slider-item { display: flex; flex-direction: column; gap: 8px; }
        .slider-header { display: flex; justify-content: space-between; font-size: 14px; }
        .slider-name { color: var(--text); }
        .slider-value { color: var(--primary); font-weight: bold; }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(99, 102, 241, 0.2);
            outline: none;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }
        
        .btn-generate {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
        }
        
        .btn-reset {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--primary);
            border-radius: 8px;
            color: var(--primary);
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
        }
        
        /* 热号榜 */
        .hot-list { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .hot-item { text-align: center; padding: 8px; background: rgba(239, 68, 68, 0.1); border-radius: 6px; }
        .hot-item .num { font-size: 20px; font-weight: bold; color: var(--danger); }
        .hot-item .count { font-size: 10px; color: var(--text-muted); }
        
        /* 柱状图 */
        .chart { margin-top: 12px; }
        .chart-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .chart-label { width: 30px; font-size: 12px; color: var(--text-muted); }
        .chart-bar-inner { flex: 1; height: 16px; background: rgba(99, 102, 241, 0.2); border-radius: 4px; overflow: hidden; }
        .chart-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 4px; }
        .chart-count { width: 40px; font-size: 12px; color: var(--text-muted); text-align: right; }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            font-size: 10px;
            cursor: pointer;
        }
        
        .nav-item.active { color: var(--primary); }
        .nav-item svg { width: 24px; height: 24px; }
        
        .copy-hint { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 8px; }
        
        .hidden { display: none !important; }
        
        /* 页面 */
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎲 彩票智能分析</h1>
            <div class="countdown" id="countdownArea">
                <span id="countdownText">等待加载...</span>
            </div>
        </header>
        
        <!-- 首页 -->
        <div id="page-home" class="page active">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('pl3')">排列三</button>
                <button class="tab" onclick="switchTab('fc3d')">3D</button>
            </div>
            
            <div class="card">
                <div class="card-title">精选推荐</div>
                <div class="selected">
                    <div class="num-box" onclick="copyNumber(this)">
                        <span id="sel1">---</span>
                        <div class="label">精选 1</div>
                    </div>
                    <div class="num-box" onclick="copyNumber(this)">
                        <span id="sel2">---</span>
                        <div class="label">精选 2</div>
                    </div>
                </div>
                <div class="backup">
                    <div class="backup-item" onclick="copyNumber(this)"><span id="bak1">-</span></div>
                    <div class="backup-item" onclick="copyNumber(this)"><span id="bak2">-</span></div>
                    <div class="backup-item" onclick="copyNumber(this)"><span id="bak3">-</span></div>
                </div>
                <div class="copy-hint">点击号码即可复制</div>
            </div>
            
            <div class="card">
                <div class="card-title">胆码推荐</div>
                <div class="danma">
                    <div class="danma-item">
                        <div class="label">金胆</div>
                        <div class="num gold" id="goldDan">-</div>
                    </div>
                    <div class="danma-item">
                        <div class="label">银胆</div>
                        <div class="num silver" id="silverDan">-</div>
                    </div>
                </div>
                <div class="double-dan">双胆：<span id="doubleDan">--</span></div>
            </div>
            
            <div class="card">
                <div class="card-title">热和值</div>
                <div class="sum-list">
                    <div class="sum-item">和值 <span id="sum1">-</span></div>
                    <div class="sum-item">和值 <span id="sum2">-</span></div>
                    <div class="sum-item">和值 <span id="sum3">-</span></div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">近期战绩</div>
                <div class="stats">
                    <div class="stat-item">
                        <div class="value" id="totalCount">0</div>
                        <div class="label">已预测</div>
                    </div>
                    <div class="stat-item hit">
                        <div class="value" id="hitCount">0</div>
                        <div class="label">组选命中</div>
                    </div>
                    <div class="stat-item hit-2">
                        <div class="value" id="hitRate">0%</div>
                        <div class="label">命中率</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 历史页 -->
        <div id="page-history" class="page">
            <div class="tabs">
                <button class="tab active" onclick="switchHistoryTab('pl3')">排列三</button>
                <button class="tab" onclick="switchHistoryTab('fc3d')">3D</button>
            </div>
            
            <div class="card">
                <div class="card-title">历史记录</div>
                <div class="history-list" id="historyList">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>
        
        <!-- 设置页 -->
        <div id="page-settings" class="page">
            <div class="card">
                <div class="card-title">号码生成器</div>
                <div class="weight-sliders">
                    <div class="slider-item">
                        <div class="slider-header">
                            <span class="slider-name">马尔可夫链</span>
                            <span class="slider-value" id="markovVal">50%</span>
                        </div>
                        <input type="range" id="markov" min="0" max="100" value="50" oninput="updateSlider()">
                    </div>
                    <div class="slider-item">
                        <div class="slider-header">
                            <span class="slider-name">随机生成</span>
                            <span class="slider-value" id="randomVal">50%</span>
                        </div>
                        <input type="range" id="random" min="0" max="100" value="50" oninput="updateSlider()">
                    </div>
                </div>
                <button class="btn-generate" onclick="regenerate()">重新生成</button>
                <button class="btn-reset" onclick="resetSlider()">恢复默认</button>
            </div>
            
            <div class="card">
                <div class="card-title">热号排行榜</div>
                <div class="hot-list" id="hotList"></div>
            </div>
            
            <div class="card">
                <div class="card-title">和值分布</div>
                <div class="chart" id="sumChart"></div>
            </div>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage('home')">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>首页</span>
        </div>
        <div class="nav-item" onclick="showPage('history')">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
            <span>历史</span>
        </div>
        <div class="nav-item" onclick="showPage('settings')">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            <span>设置</span>
        </div>
    </div>
    
    <script>
        let currentLottery = 'pl3';
        let currentHistoryLottery = 'pl3';
        let data = null;
        let historyData = null;
        
        async function loadData() {
            try {
                const res = await fetch('today_result.json?t=' + Date.now());
                if (res.ok) {
                    data = await res.json();
                    updateUI();
                    updatePeriod();
                } else {
                    console.log('Failed to load today_result.json');
                    loadDefaultData();
                }
            } catch (e) {
                console.log('Error loading data:', e);
                loadDefaultData();
            }
            
            try {
                const res2 = await fetch('stats.json?t=' + Date.now());
                if (res2.ok) {
                    historyData = await res2.json();
                    updateStats();
                }
            } catch (e) {
                console.log('No stats data');
            }
            
            updateHotList();
            updateSumChart();
        }
        
        function loadDefaultData() {
            // 默认数据
            data = {
                period: '2026092',
                pl3: {
                    selected_2: ['886', '881'],
                    backup_3: ['286', '686', '888'],
                    gold_dan: 8,
                    silver_dan: 2,
                    double_dan: ['82', '28'],
                    key_sum: [14, 16, 15]
                },
                fc3d: {
                    selected_2: ['875', '873'],
                    backup_3: ['874', '878', '974'],
                    gold_dan: 7,
                    silver_dan: 8,
                    double_dan: ['78', '87'],
                    key_sum: [17, 10, 9]
                }
            };
            updateUI();
            updatePeriod();
        }
        
        function updateUI() {
            if (!data) return;
            
            const info = data[currentLottery];
            
            document.getElementById('sel1').textContent = info.selected_2[0] || '---';
            document.getElementById('sel2').textContent = info.selected_2[1] || '---';
            document.getElementById('bak1').textContent = info.backup_3[0] || '-';
            document.getElementById('bak2').textContent = info.backup_3[1] || '-';
            document.getElementById('bak3').textContent = info.backup_3[2] || '-';
            
            document.getElementById('goldDan').textContent = info.gold_dan;
            document.getElementById('silverDan').textContent = info.silver_dan;
            document.getElementById('doubleDan').textContent = info.double_dan.join(', ');
            
            document.getElementById('sum1').textContent = info.key_sum[0];
            document.getElementById('sum2').textContent = info.key_sum[1];
            document.getElementById('sum3').textContent = info.key_sum[2];
        }
        
        function updateStats() {
            if (!historyData || !historyData.stats) return;
            
            const stats = historyData.stats[currentLottery];
            if (!stats) return;
            
            document.getElementById('totalCount').textContent = stats.total || 0;
            document.getElementById('hitCount').textContent = stats.group || 0;
            document.getElementById('hitRate').textContent = (stats.group_rate || 0).toFixed(1) + '%';
        }
        
        function updateHistoryList() {
            const list = document.getElementById('historyList');
            
            if (!historyData || !historyData.history) {
                list.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px;">暂无历史记录</div>';
                return;
            }
            
            const records = historyData.history[currentHistoryLottery] || [];
            
            if (records.length === 0) {
                list.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px;">暂无历史记录</div>';
                return;
            }
            
            list.innerHTML = records.slice(0, 20).map(r => {
                const hitClass = r.hit === 'miss' ? 'miss' : r.hit;
                const hitText = r.hit === 'direct' ? '直选' : r.hit === 'group' ? '组选' : r.hit === 'partial' ? '2同' : '未中';
                return '<div class="history-item ' + (r.hit !== 'miss' ? r.hit : '') + '">' +
                    '<div><div class="history-period">第' + r.period + '期</div>' +
                    '<div class="history-recommend">' + r.recommend.join(', ') + '</div></div>' +
                    '<div><div class="history-draw">' + r.last_draw + '</div>' +
                    '<div class="history-hit ' + hitClass + '">' + hitText + '</div></div>' +
                    '</div>';
            }).join('');
        }
        
        function switchTab(lottery) {
            currentLottery = lottery;
            document.querySelectorAll('#page-home .tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            updateUI();
            updateStats();
        }
        
        function switchHistoryTab(lottery) {
            currentHistoryLottery = lottery;
            document.querySelectorAll('#page-history .tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            updateHistoryList();
        }
        
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('page-' + page).classList.add('active');
            event.target.closest('.nav-item').classList.add('active');
            
            if (page === 'history') {
                updateHistoryList();
            }
        }
        
        function copyNumber(el) {
            const num = el.querySelector('span').textContent;
            if (num.length === 3) {
                navigator.clipboard.writeText(num);
                alert('已复制: ' + num);
            }
        }
        
        function updateSlider() {
            const markov = document.getElementById('markov').value;
            const random = document.getElementById('random').value;
            document.getElementById('markovVal').textContent = markov + '%';
            document.getElementById('randomVal').textContent = random + '%';
        }
        
        function resetSlider() {
            document.getElementById('markov').value = 50;
            document.getElementById('random').value = 50;
            updateSlider();
            alert('已恢复默认比例');
        }
        
        function regenerate() {
            alert('重新生成功能开发中...');
        }
        
        function updateHotList() {
            const hotList = document.getElementById('hotList');
            const hotNums = [7, 3, 8, 5, 2];
            hotList.innerHTML = hotNums.map(n => 
                '<div class="hot-item"><div class="num">'+n+'</div><div class="count">98次</div></div>'
            ).join('');
        }
        
        function updateSumChart() {
            const chart = document.getElementById('sumChart');
            const sums = [
                {label: 12, count: 85, max: 100},
                {label: 14, count: 72, max: 100},
                {label: 16, count: 65, max: 100}
            ];
            chart.innerHTML = sums.map(s => 
                '<div class="chart-bar">' +
                '<div class="chart-label">'+s.label+'</div>' +
                '<div class="chart-bar-inner"><div class="chart-bar-fill" style="width:'+(s.count/s.max*100)+'%"></div></div>' +
                '<div class="chart-count">'+s.count+'</div>' +
                '</div>'
            ).join('');
        }
        
        function updateCountdown() {
            const now = new Date();
            
            // 排列三倒计时
            let pl3Target = new Date();
            pl3Target.setHours(21, 15, 0, 0);
            if (now > pl3Target) pl3Target.setDate(pl3Target.getDate() + 1);
            
            let pl3Diff = pl3Target - now;
            let pl3Hours = Math.floor(pl3Diff / 3600000);
            let pl3Minutes = Math.floor((pl3Diff % 3600000) / 60000);
            let pl3Seconds = Math.floor((pl3Diff % 60000) / 1000);
            
            document.getElementById('pl3Countdown').textContent = 
                pl3Hours.toString().padStart(2,'0') + ':' +
                pl3Minutes.toString().padStart(2,'0') + ':' +
                pl3Seconds.toString().padStart(2,'0');
            
            // 3D倒计时（同时开奖）
            document.getElementById('fc3dCountdown').textContent = 
                pl3Hours.toString().padStart(2,'0') + ':' +
                pl3Minutes.toString().padStart(2,'0') + ':' +
                pl3Seconds.toString().padStart(2,'0');
        }
        
        function updatePeriod() {
            if (data && data.period) {
                document.getElementById('nextPeriod').textContent = data.period;
            }
        }
        
        // 初始化
        loadData();
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
