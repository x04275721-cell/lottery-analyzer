<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>📊 今日分析 - 彩票智能分析系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; }
        .container { max-width: 900px; margin: 0 auto; padding: 15px; }
        h1 { text-align: center; font-size: 1.6em; margin-bottom: 10px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: rgba(255,255,255,0.7); margin-bottom: 15px; font-size: 0.85em; }
        
        /* 导航 */
        .nav-menu { display: flex; gap: 8px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap; }
        .nav-item { padding: 8px 15px; background: rgba(255,255,255,0.1); border-radius: 15px; color: white; text-decoration: none; font-size: 0.85em; transition: all 0.3s; }
        .nav-item:hover, .nav-item.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        
        /* 卡片 */
        .card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .card-title { font-size: 1em; margin-bottom: 10px; color: #667eea; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }
        
        /* 加载状态 */
        .loading { text-align: center; padding: 20px; color: rgba(255,255,255,0.6); }
        .loading-spinner { display: inline-block; width: 25px; height: 25px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 号码球 */
        .number-ball { width: 32px; height: 32px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; margin: 2px; }
        .number-ball.hot { background: linear-gradient(135deg, #f87171 0%, #ef4444 100%); }
        .number-ball.selected { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); transform: scale(1.15); }
        
        /* 推荐卡片 */
        .rec-card { background: linear-gradient(135deg, rgba(102,126,234,0.2) 0%, rgba(118,75,162,0.2) 100%); border: 2px solid #667eea; border-radius: 15px; padding: 15px; margin: 10px 0; }
        .rec-number { font-size: 2em; font-weight: bold; text-align: center; color: #fbbf24; margin: 10px 0; }
        .rec-detail { font-size: 0.85em; color: rgba(255,255,255,0.7); text-align: center; }
        
        /* 信息网格 */
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin: 10px 0; }
        .info-box { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; text-align: center; }
        .info-label { font-size: 0.75em; color: rgba(255,255,255,0.6); margin-bottom: 5px; }
        .info-value { font-size: 1.1em; font-weight: bold; color: #667eea; }
        .info-value.highlight { color: #fbbf24; }
        
        /* 大底号码 */
        .base-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 10px 0; }
        .base-item { padding: 8px 12px; background: rgba(102,126,234,0.2); border-radius: 8px; font-weight: bold; }
        .base-item.star { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        
        /* 提示框 */
        .tip-box { background: rgba(251,191,36,0.2); border-left: 3px solid #fbbf24; padding: 10px; border-radius: 0 8px 8px 0; margin: 10px 0; font-size: 0.85em; }
        
        /* 状态指示 */
        .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(74,222,128,0.2); border-radius: 10px; margin-bottom: 15px; }
        .status-text { font-size: 0.85em; }
        .status-text span { color: #4ade80; font-weight: bold; }
        
        /* 页脚 */
        .footer { text-align: center; color: rgba(255,255,255,0.5); font-size: 0.75em; margin-top: 20px; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 今日智能分析</h1>
        <div class="subtitle" id="dateInfo">加载中...</div>

        <!-- 导航 -->
        <div class="nav-menu">
            <a href="index.html" class="nav-item active">📊 今日分析</a>
            <a href="tracking.html" class="nav-item">📈 回溯系统</a>
            <a href="automation.html" class="nav-item">🤖 自动生成</a>
        </div>

        <!-- 状态指示 -->
        <div class="status-bar">
            <div class="status-text">✅ 系统状态：<span>正常运行</span></div>
            <div class="status-text" id="updateStatus">数据加载中...</div>
        </div>

        <!-- 排列三 -->
        <div class="card">
            <div class="card-title">🎯 排列三今日推荐</div>
            <div id="pl3Container"><div class="loading"><div class="loading-spinner"></div></div></div>
        </div>

        <!-- 福彩3D -->
        <div class="card">
            <div class="card-title">🎯 福彩3D今日推荐</div>
            <div id="fc3dContainer"><div class="loading"><div class="loading-spinner"></div></div></div>
        </div>

        <!-- 马尔可夫分析 -->
        <div class="card">
            <div class="card-title">🔬 智能分析（基于历史数据）</div>
            <div id="analysisContainer"><div class="loading"><div class="loading-spinner"></div></div></div>
        </div>

        <div class="footer">
            ⚠️ 彩票有风险，投注需谨慎 | 本系统基于历史数据智能分析，仅供参考
        </div>
    </div>

    <script>
        // 加载今日推荐
        async function loadTodayRecommendation() {
            try {
                const response = await fetch('today_result.json?t=' + Date.now());
                if (!response.ok) throw new Error('数据加载失败');
                
                const data = await response.json();
                renderRecommendation(data);
                updateStatus(data.generated_at);
                
            } catch (error) {
                console.error('加载失败:', error);
                showError('pl3Container', '数据加载失败');
                showError('fc3dContainer', '数据加载失败');
            }
        }

        // 渲染推荐
        function renderRecommendation(data) {
            // 更新日期
            document.getElementById('dateInfo').textContent = 
                `📅 第${data.period}期 | ${data.date}`;
            
            // 排列三
            renderGame('pl3Container', data.pl3, '排列三');
            
            // 福彩3D
            renderGame('fc3dContainer', data.fc3d, '福彩3D');
            
            // 分析
            renderAnalysis(data);
        }

        // 渲染单个彩种
        function renderGame(containerId, gameData, gameName) {
            const container = document.getElementById(containerId);
            
            // 信息卡片
            let html = `
                <div class="info-grid">
                    <div class="info-box">
                        <div class="info-label">试机号</div>
                        <div class="info-value highlight">${gameData.test || '---'}</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">开机号</div>
                        <div class="info-value highlight">${gameData.boot || '---'}</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">重点和值</div>
                        <div class="info-value">${(gameData.key_sum || []).join(',')}</div>
                    </div>
                </div>
                
                <!-- 精选2注 -->
                <div class="rec-card">
                    <div style="text-align:center; margin-bottom:10px; color:rgba(255,255,255,0.7);">⭐ 精选2注</div>
                    ${renderSelectedNumbers(gameData.selected_2 || [])}
                </div>
                
                <!-- 10注大底 -->
                <div style="margin-top:15px;">
                    <div style="text-align:center; margin-bottom:8px; color:rgba(255,255,255,0.7);">📋 十注大底（精选已含其中）</div>
                    <div class="base-grid">
                        ${(gameData.base_10 || []).map(n => 
                            `<div class="base-item ${(gameData.selected_2 || []).includes(n) ? 'star' : ''}">${n}</div>`
                        ).join('')}
                    </div>
                </div>
                
                <div class="tip-box">
                    <strong>💡 选号原则：</strong>精选2注和十注大底的和值均从重点和值中产生，已排除试机号和开机号
                </div>
            `;
            
            container.innerHTML = html;
        }

        // 渲染精选号码
        function renderSelectedNumbers(numbers) {
            if (!numbers || numbers.length === 0) return '<div class="rec-number">---</div>';
            
            return numbers.map((num, idx) => `
                <div class="rec-number">${num.split('').map(n => `<span class="number-ball${idx===0?' selected':''}">${n}</span>`).join('')}</div>
                <div class="rec-detail">和值：${sum(num)} | 跨度：${span(num)}</div>
            `).join('');
        }

        // 渲染分析
        function renderAnalysis(data) {
            const container = document.getElementById('analysisContainer');
            
            // 基于数据的简单分析
            const pl3Keys = data.pl3?.key_sum || [];
            const fc3dKeys = data.fc3d?.key_sum || [];
            
            container.innerHTML = `
                <div class="info-grid">
                    <div class="info-box">
                        <div class="info-label">排列三热门和值</div>
                        <div class="info-value">${pl3Keys.slice(0,3).join(',')}</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">3D热门和值</div>
                        <div class="info-value">${fc3dKeys.slice(0,3).join(',')}</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">分析期数</div>
                        <div class="info-value">1000期</div>
                    </div>
                </div>
                <div class="tip-box">
                    <strong>📊 马尔可夫链分析：</strong>基于最近1000期历史数据，系统自动识别热号、冷号，并结合本期试机号、开机号进行智能筛选。
                </div>
            `;
        }

        // 计算和值
        function sum(num) {
            return num.split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
        }

        // 计算跨度
        function span(num) {
            const arr = num.split('').map(Number);
            return Math.max(...arr) - Math.min(...arr);
        }

        // 更新状态
        function updateStatus(time) {
            document.getElementById('updateStatus').innerHTML = 
                `最后更新：<span>${time ? new Date(time).toLocaleString('zh-CN') : '未知'}</span>`;
        }

        // 显示错误
        function showError(containerId, message) {
            document.getElementById(containerId).innerHTML = 
                `<div class="tip-box" style="background:rgba(248,113,113,0.2);border-color:#f87171;">
                    <strong>⚠️ ${message}</strong>
                </div>`;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', async function() {
            await loadTodayRecommendation();
        });
    </script>
</body>
</html>
