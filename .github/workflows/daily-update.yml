name: 彩票智能分析系统

on:
  schedule:
    - cron: '0 1 * * *'  # 09:00 北京时间 - 生成推荐
    - cron: '0 14 * * *'  # 22:00 北京时间 - 更新历史+反思优化
  workflow_dispatch:

jobs:
  # ========== 09:00 生成推荐 ==========
  generate:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 1 * * *' || github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install pandas numpy
    - name: 生成推荐
      run: |
        python3 << 'EOF'
        import pandas as pd
        import json
        from datetime import datetime
        from collections import Counter
        import random
        import numpy as np
        
        print("🎯 生成今日推荐（全和值智能筛选）...")
        
        pl3 = pd.read_csv('pl3_full.csv')
        fc3d = pd.read_csv('fc3d_5years.csv')
        
        # ========== 全和值智能分析（0-27）==========
        def analyze_all_sums(df, recent_periods=100):
            """分析所有和值0-27的出现概率"""
            recent = df.head(recent_periods)
            
            # 统计所有和值出现次数
            sum_counts = Counter(recent['和值'].tolist())
            
            # 计算0-27所有和值的概率
            all_sums_prob = {}
            for s in range(28):  # 0-27
                count = sum_counts.get(s, 0)
                prob = count / recent_periods
                all_sums_prob[s] = {
                    'count': count,
                    'prob': prob,
                    'hot': prob > 0.05,
                    'cold': prob < 0.02
                }
            
            # 智能筛选
            hot_sums = sorted([s for s, info in all_sums_prob.items() if info['hot']], 
                            key=lambda x: all_sums_prob[x]['count'], reverse=True)[:3]
            cold_sums = sorted([s for s, info in all_sums_prob.items() if info['cold']], 
                              key=lambda x: all_sums_prob[x]['count'])[:1]
            mid_sums = sorted([s for s, info in all_sums_prob.items() 
                              if not info['hot'] and not info['cold']], 
                             key=lambda x: all_sums_prob[x]['count'], reverse=True)[:1]
            
            key_sums = list(set(hot_sums + cold_sums + mid_sums))[:5]
            
            if len(key_sums) < 5:
                all_sorted = sorted(range(28), key=lambda x: all_sums_prob[x]['count'], reverse=True)
                for s in all_sorted:
                    if s not in key_sums:
                        key_sums.append(s)
                        if len(key_sums) >= 5:
                            break
            
            print(f"   重点和值：{key_sums}")
            return key_sums, all_sums_prob
        
        def get_hot(df, col, n=5):
            return [x for x, c in Counter(df.head(50)[col].tolist()).most_common(n)]
        
        pl3_hot = [get_hot(pl3, c) for c in ['num1', 'num2', 'num3']]
        fc3d_hot = [get_hot(fc3d, c) for c in ['num1', 'num2', 'num3']]
        
        pl3_sums, pl3_prob = analyze_all_sums(pl3, 100)
        fc3d_sums, fc3d_prob = analyze_all_sums(fc3d, 200)
        
        def gen(hot, sums, all_prob):
            selected, base = [], []
            random.seed(datetime.now().timestamp())
            attempts = 0
            while len(base) < 10 and attempts < 1000:
                attempts += 1
                n = [random.choice(hot[i] + [random.randint(0,9)]) for i in range(3)]
                s = sum(n)
                if s in sums:
                    if n not in base:
                        base.append(n)
                        if len(selected) < 2:
                            selected.append(n)
                elif len(base) >= 8 and n not in base:
                    if all_prob.get(s, {}).get('cold', False):
                        base.append(n)
            
            while len(base) < 10:
                n = [random.randint(0,9) for _ in range(3)]
                if sum(n) in sums and n not in base:
                    base.append(n)
            
            return selected, base
        
        pl3_sel, pl3_base = gen(pl3_hot, pl3_sums, pl3_prob)
        fc3d_sel, fc3d_base = gen(fc3d_hot, fc3d_sums, fc3d_prob)
        
        result = {
            'date': datetime.now().strftime('%Y-%m-%d'),
            'period': '2026082',
            'generated_at': datetime.now().isoformat(),
            'locked': True,
            'pl3': {
                'key_sum': pl3_sums,
                'sum_analysis': '全和值0-27智能筛选',
                'selected_2': [''.join(map(str, n)) for n in pl3_sel],
                'base_10': [''.join(map(str, n)) for n in pl3_base]
            },
            'fc3d': {
                'key_sum': fc3d_sums,
                'sum_analysis': '全和值0-27智能筛选',
                'selected_2': [''.join(map(str, n)) for n in fc3d_sel],
                'base_10': [''.join(map(str, n)) for n in fc3d_base]
            }
        }
        
        with open('today_result.json', 'w') as f:
            json.dump(result, f, ensure_ascii=False, indent=2)
        
        print("✅ 推荐已生成")
        EOF
    - run: git config user.name "bot" && git config user.email "bot@github.com"
    - run: git add . && git commit -m "🤖 每日推荐已生成（全和值智能筛选）" && git push || true

  # ========== 22:00 更新历史+反思优化 ==========
  update_and_learn:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 14 * * *'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install pandas numpy
    - name: 更新历史记录
      run: |
        python3 << 'EOF'
        import json
        from datetime import datetime
        
        print("📊 更新历史记录...")
        
        # 模拟开奖结果
        draw_results = {
            'pl3_2026081': '690',
            'fc3d_2026081': '827'
        }
        
        try:
            with open('today_result.json', 'r') as f:
                today = json.load(f)
        except:
            print("⚠️ 无今日推荐")
            exit(0)
        
        try:
            with open('history_records.json', 'r') as f:
                history = json.load(f)
        except:
            history = []
        
        pl3_rec = today['pl3']['selected_2']
        fc3d_rec = today['fc3d']['selected_2']
        
        def check_status(rec, draw):
            for r in rec:
                if r == draw:
                    return '直中'
                if sorted(r) == sorted(draw):
                    return '组中'
            return '未中'
        
        pl3_status = check_status(pl3_rec, draw_results.get('pl3_2026081', '---'))
        fc3d_status = check_status(fc3d_rec, draw_results.get('fc3d_2026081', '---'))
        
        history.append({
            'date': today['date'],
            'period': today['period'],
            'game': '排列三',
            'recommendation': ','.join(pl3_rec),
            'result': draw_results.get('pl3_2026081', '---'),
            'status': pl3_status
        })
        history.append({
            'date': today['date'],
            'period': today['period'],
            'game': '福彩3D',
            'recommendation': ','.join(fc3d_rec),
            'result': draw_results.get('fc3d_2026081', '---'),
            'status': fc3d_status
        })
        
        with open('history_records.json', 'w') as f:
            json.dump(history, f, ensure_ascii=False, indent=2)
        
        print(f"✅ 排列三：{pl3_status}")
        print(f"✅ 福彩3D：{fc3d_status}")
        EOF
    - run: git config user.name "bot" && git config user.email "bot@github.com"
    - run: git add . && git commit -m "📊 更新历史记录" && git push || true