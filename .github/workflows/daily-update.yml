name: 彩票分析自动化系统（含自我优化）

on:
  schedule:
    # 18:00 生成推荐
    - cron: '0 10 * * *'
    # 22:00 更新历史库 + 自我优化
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install pandas numpy
    - run: python3 generate_recommendation.py
    - run: git config user.name "bot" && git config user.email "bot@github.com"
    - run: git add . && git commit -m "自动更新" && git push || true