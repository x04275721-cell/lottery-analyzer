name: 彩票智能分析系统 V6 - 三阶马尔可夫链

on:
  schedule:
    - cron: '0 1 * * *'  # 09:00 北京时间
    - cron: '0 14 * * *'  # 22:00 北京时间
  workflow_dispatch:

jobs:
  # ========== 09:00 三阶马尔可夫链分析 ==========
  markov_analysis:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 1 * * *' || github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: pip install pandas numpy
    
    - name: 获取最新数据
      run: |
        python3 << 'PYEOF'
        import requests
        
        print("获取最新数据...")
        
        for name, url, file in [
            ("排列三", "http://data.17500.cn/pl3_asc.txt", "pl3_full.csv"),
            ("3D", "http://data.17500.cn/3d_asc.txt", "fc3d_5years.csv")
        ]:
            try:
                resp = requests.get(url, timeout=10)
                if resp.status_code == 200:
                    lines = resp.text.strip().split('\n')
                    existing = set()
                    try:
                        with open(file, 'r') as f:
                            next(f)
                            for line in f:
                                p = line.strip().split(',')
                                if p: existing.add(p[0])
                    except: pass
                    
                    new_data = []
                    for line in lines[:200]:
                        parts = line.strip().split()
                        if len(parts) >= 6 and parts[0].startswith('2026') and parts[0] not in existing:
                            n1,n2,n3 = parts[1],parts[2],parts[3]
                            s = int(n1)+int(n2)+int(n3)
                            sp = max(int(n1),int(n2),int(n3))-min(int(n1),int(n2),int(n3))
                            typ = '豹子' if n1==n2==n3 else ('组三' if n1==n2 or n1==n3 or n2==n3 else '组六')
                            new_data.append(f"{parts[0]},{n1},{n2},{n3},{s},{sp},{typ}")
                    
                    if new_data:
                        new_data.reverse()
                        with open(file, 'a') as f:
                            for line in new_data: f.write(line+'\n')
                        print(f"  {name}: +{len(new_data)}条")
                    else:
                        print(f"  {name}: 已是最新")
            except Exception as e:
                print(f"  {name}: {e}")
        
        PYEOF
    
    - name: 三阶马尔可夫链分析
      id: markov
      run: |
        python3 << 'PYEOF'
        import pandas as pd
        from collections import Counter, defaultdict
        from datetime import datetime
        import json
        import random
        
        print("\n" + "="*50)
        print("三阶马尔可夫链分析 V6")
        print("="*50)
        
        # ===== 三阶马尔可夫类 =====
        def build_third_order(df):
            """构建三阶马尔可夫矩阵"""
            matrices = []
            for pos in range(3):
                col = ['num1', 'num2', 'num3'][pos]
                nums = df[col].astype(int).tolist()
                
                trans = defaultdict(lambda: defaultdict(int))
                totals = defaultdict(int)
                
                for i in range(len(nums) - 3):
                    key = (nums[i], nums[i+1], nums[i+2])
                    curr = nums[i+3]
                    trans[key][curr] += 1
                    totals[key] += 1
                
                # 转概率
                matrix = {}
                for key in totals:
                    matrix[key] = {d: trans[key].get(d, 0) + 0.01 for d in range(10)}
                    total = sum(matrix[key].values())
                    for d in matrix[key]: matrix[key][d] /= total
                
                if totals:
                    best_key = max(totals.keys(), key=lambda k: totals[k])
                    best_digit = max(range(10), key=lambda d: trans[best_key][d])
                    prob = trans[best_key][best_digit] / totals[best_key]
                    print(f"  位置{pos+1}最强: ({best_key}) -> {best_digit} ({prob:.1%})")
                
                matrices.append(matrix)
            return matrices
        
        def build_first_order(df):
            """一阶马尔可夫"""
            nums = list(zip(df['num1'].astype(int), df['num2'].astype(int), df['num3'].astype(int)))
            matrix = defaultdict(lambda: defaultdict(int))
            totals = defaultdict(int)
            
            for i in range(len(nums) - 1):
                for p, c in zip(nums[i], nums[i+1]):
                    matrix[p][c] += 1
                    totals[p] += 1
            
            result = {}
            for p in range(10):
                result[p] = {c: (matrix[p][c] / totals[p] if totals[p] > 0 else 0.01) for c in range(10)}
                total = sum(result[p].values())
                for c in result[p]: result[p][c] /= total
            return result
        
        def predict(markov3, markov1, history, pos):
            """综合预测"""
            if len(history) >= 3:
                key = (history[-3][pos], history[-2][pos], history[-1][pos])
            elif len(history) >= 2:
                key = (history[-2][pos], history[-1][pos], 5)
            elif len(history) >= 1:
                key = (history[-1][pos], 5, 5)
            else:
                key = (5, 5, 5)
            
            probs3 = markov3[pos].get(key, {d: 0.1 for d in range(10)})
            if history:
                probs1 = markov1.get(history[-1][pos], {d: 0.1 for d in range(10)})
            else:
                probs1 = {d: 0.1 for d in range(10)}
            
            combined = {d: probs3.get(d, 0.1) * 0.6 + probs1.get(d, 0.1) * 0.4 for d in range(10)}
            total = sum(combined.values())
            for d in combined: combined[d] /= total
            return combined
        
        def analyze(df, name, history):
            """分析"""
            print(f"\n{name}分析 ({len(df)}期):")
            
            # 构建矩阵
            markov3 = build_third_order(df)
            markov1 = build_first_order(df)
            
            # 位置热号
            hot = []
            for i, col in enumerate(['num1', 'num2', 'num3']):
                counter = Counter(df.head(100)[col].tolist())
                hot.append([d for d, c in counter.most_common(8)])
            
            # 和值
            sums = Counter(df.head(100)['和值'].tolist())
            hot_sums = [s for s, c in sums.most_common(8)]
            
            # 生成候选
            candidates = []
            for _ in range(500):
                nums = []
                for pos in range(3):
                    probs = predict(markov3, markov1, history, pos)
                    digit = random.choices(range(10), weights=[probs[d] for d in range(10)])[0]
                    nums.append(digit)
                candidates.append(tuple(nums))
            
            for _ in range(200):
                nums = tuple(random.choice(hot[p]) for p in range(3))
                candidates.append(nums)
            
            # 去重
            seen = set(candidates)
            candidates = list(seen)
            
            # 评分
            def score(nums):
                s = 0
                for pos in range(3):
                    probs = predict(markov3, markov1, history, pos)
                    s += probs.get(nums[pos], 0.01) * 50
                for pos, d in enumerate(nums):
                    if d in hot[pos][:5]: s += 10
                if sum(nums) in hot_sums[:5]: s += 15
                span = max(nums) - min(nums)
                if span in [3,4,5,6]: s += 10
                return min(s, 100)
            
            candidates.sort(key=lambda x: score(x), reverse=True)
            
            results = []
            for i, nums in enumerate(candidates[:10], 1):
                num_str = ''.join(map(str, nums))
                print(f"  {i}. {num_str} (和:{sum(nums)} 分:{score(nums):.1f})")
                results.append(num_str)
            
            return results
        
        # ===== 主程序 =====
        results = {}
        
        # 排列三
        try:
            pl3_df = pd.read_csv('pl3_full.csv')
            pl3_history = list(zip(pl3_df['num1'].astype(int), pl3_df['num2'].astype(int), pl3_df['num3'].astype(int)))
            pl3_history = list(pl3_history[:5])
            results['pl3'] = analyze(pl3_df, "排列三", pl3_history)
        except Exception as e:
            print(f"排列三失败: {e}")
            results['pl3'] = ['???', '???']
        
        # 3D
        try:
            fc3d_df = pd.read_csv('fc3d_5years.csv')
            fc3d_history = list(zip(fc3d_df['num1'].astype(int), fc3d_df['num2'].astype(int), fc3d_df['num3'].astype(int)))
            fc3d_history = list(fc3d_history[:5])
            results['fc3d'] = analyze(fc3d_df, "3D", fc3d_history)
        except Exception as e:
            print(f"3D失败: {e}")
            results['fc3d'] = ['???', '???']
        
        # 保存
        base = datetime(2026, 1, 1)
        today = datetime.now()
        period = f"2026{str((today-base).days+1).zfill(3)}"
        
        output = {
            'date': today.strftime('%Y-%m-%d'),
            'period': period,
            'generated_at': today.isoformat(),
            'algorithm': 'Third-Order Markov Chain V6',
            'locked': True,
            'pl3': {
                'selected_2': results['pl3'][:2],
                'base_10': results['pl3'][:10],
                'key_sum': sorted(list(set([int(r[0])+int(r[1])+int(r[2]) for r in results['pl3'][:10]])))[:5]
            },
            'fc3d': {
                'selected_2': results['fc3d'][:2],
                'base_10': results['fc3d'][:10],
                'key_sum': sorted(list(set([int(r[0])+int(r[1])+int(r[2]) for r in results['fc3d'][:10]])))[:5]
            }
        }
        
        with open('today_result.json', 'w') as f:
            json.dump(output, f, ensure_ascii=False, indent=2)
        
        print("\n" + "="*50)
        print("V6三阶马尔可夫分析完成!")
        print("="*50)
        
        PYEOF
    
    - name: 提交
      run: |
        git config user.name "Markov V6 Bot"
        git config user.email "bot@github.com"
        git add . && git commit -m "V6三阶马尔可夫链 $(date +'%Y-%m-%d')" && git push || echo "No changes"

  # ========== 22:00 更新历史 ==========
  update_history:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 14 * * *'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: python-version: '3.11'
    - run: pip install pandas numpy requests
    
    - name: 获取开奖结果
      run: |
        python3 << 'PYEOF'
        import json, requests
        from datetime import datetime, timedelta
        
        base = datetime(2026, 1, 1)
        yest = datetime.now() - timedelta(days=1)
        period = f"2026{str((yest-base).days).zfill(3)}"
        
        pl3_r, fc3d_r = '---', '---'
        for url, name, ref in [("http://data.17500.cn/pl3_asc.txt","排列三",pl3_r),
                                ("http://data.17500.cn/3d_asc.txt","3D",fc3d_r)]:
            try:
                resp = requests.get(url, timeout=10)
                if resp.status_code==200:
                    for line in resp.text.split('\n'):
                        parts = line.strip().split()
                        if len(parts)>=4 and parts[0]==period:
                            if name=="排列三": pl3_r=parts[3].zfill(3)
                            else: fc3d_r=parts[3].zfill(3)
                            print(f"  {name}: {parts[3]}")
                            break
            except: pass
        
        with open('latest_results.json','w') as f:
            json.dump({'period':period,'pl3':pl3_r,'fc3d':fc3d_r},f)
        PYEOF
    
    - name: 更新历史
      run: |
        python3 << 'PYEOF'
        import json
        
        try:
            with open('today_result.json') as f: today = json.load(f)
        except: exit(0)
        
        try:
            with open('latest_results.json') as f: results = json.load(f)
        except: results = {'pl3':'---','fc3d':'---'}
        
        try:
            with open('history_records.json') as f: hist = json.load(f)
        except: hist = []
        
        period = today.get('period','')
        
        if not any(h.get('period')==period and h.get('game')=='排列三' for h in hist):
            def check(r, d):
                if d=='---': return '待开奖'
                for x in r:
                    if x==d: return '直中'
                    if sorted(x)==sorted(d): return '组中'
                return '未中'
            
            hist.append({'date':today['date'],'period':period,'game':'排列三',
                        'recommendation':','.join(today['pl3']['selected_2']),
                        'result':results.get('pl3','---'),
                        'status':check(today['pl3']['selected_2'],results.get('pl3','---'))})
            
            hist.append({'date':today['date'],'period':period,'game':'3D',
                        'recommendation':','.join(today['fc3d']['selected_2']),
                        'result':results.get('fc3d','---'),
                        'status':check(today['fc3d']['selected_2'],results.get('fc3d','---'))})
            
            hist[-100:]
            
            with open('history_records.json','w') as f:
                json.dump(hist, f, ensure_ascii=False, indent=2)
            
            total = len(hist)
            hits = sum(1 for h in hist if h.get('status') in ['直中','组中'])
            print(f"历史已更新: {total}期, 命中{hits}次 ({hits/total*100:.1f}%)")
        else:
            print("本期已记录")
        PYEOF
    
    - name: 提交
      run: |
        git config user.name "Bot"
        git config user.email "bot@github.com"
        git add . && git commit -m "更新历史 $(date +'%Y-%m-%d')" && git push || echo "No changes"
