name: 彩票分析自动化

on:
  schedule:
    - cron: '0 10 * * *'  # 18:00 北京时间
    - cron: '0 14 * * *'  # 22:00 北京时间
  workflow_dispatch:      # 手动触发
  workflow_call:          # 可被调用

jobs:
  # 生成推荐
  generate:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install pandas numpy
    - name: 生成推荐
      run: |
        python3 << 'PYEOF'
        import pandas as pd
        import json
        from datetime import datetime
        from collections import Counter
        import random
        
        pl3 = pd.read_csv('pl3_full.csv')
        fc3d = pd.read_csv('fc3d_5years.csv')
        
        # 生成推荐
        pl3_sums = Counter(pl3.head(50)['和值'].tolist()).most_common(5)
        fc3d_sums = Counter(fc3d.head(100)['和值'].tolist()).most_common(5)
        
        pl3_keys = [s[0] for s in pl3_sums]
        fc3d_keys = [s[0] for s in fc3d_sums]
        
        pl3_sel, fc3d_sel = [], []
        random.seed()
        
        while len(pl3_sel) < 2:
            n = [random.randint(0,9) for _ in range(3)]
            if sum(n) in pl3_keys and n not in pl3_sel:
                pl3_sel.append(n)
        
        while len(fc3d_sel) < 2:
            n = [random.randint(0,9) for _ in range(3)]
            if sum(n) in fc3d_keys and n not in fc3d_sel:
                fc3d_sel.append(n)
        
        pl3_base = pl3_sel.copy()
        while len(pl3_base) < 10:
            n = [random.randint(0,9) for _ in range(3)]
            if sum(n) in pl3_keys and n not in pl3_base:
                pl3_base.append(n)
        
        fc3d_base = fc3d_sel.copy()
        while len(fc3d_base) < 10:
            n = [random.randint(0,9) for _ in range(3)]
            if sum(n) in fc3d_keys and n not in fc3d_base:
                fc3d_base.append(n)
        
        result = {
          'date': datetime.now().strftime('%Y-%m-%d'),
          'generated_at': datetime.now().isoformat(),
          'locked': True,
          'pl3': {
            'selected_2': [''.join(map(str,n)) for n in pl3_sel],
            'base_10': [''.join(map(str,n)) for n in pl3_base],
            'key_sum': pl3_keys
          },
          'fc3d': {
            'selected_2': [''.join(map(str,n)) for n in fc3d_sel],
            'base_10': [''.join(map(str,n)) for n in fc3d_base],
            'key_sum': fc3d_keys
          }
        }
        
        with open('today_result.json','w') as f:
          json.dump(result,f,ensure_ascii=False,indent=2)
        
        print('✅ 推荐已生成')
        PYEOF
    - run: git config user.name "bot" && git config user.email "bot@github.com"
    - run: git add . && git commit -m "🤖 自动更新推荐" && git push || true