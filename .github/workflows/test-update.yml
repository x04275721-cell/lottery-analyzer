name: 手动测试更新

on:
  workflow_dispatch:  # 手动触发

jobs:
  test-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 安装依赖
      run: |
        pip install pandas numpy
        
    - name: 测试分析程序
      run: |
        echo "🧪 测试模式运行..."
        python3 -c "
        import pandas as pd
        print('排列三数据:', len(pd.read_csv('pl3_full.csv')), '期')
        print('福彩3D数据:', len(pd.read_csv('fc3d_5years.csv')), '期')
        print('✅ 数据文件正常')
        "
        
    - name: 生成测试结果
      run: |
        echo '{"test": true, "message": "测试成功"}' > test_result.json
        
    - name: 查看结果
      run: |
        cat test_result.json
        echo "✅ 测试完成！"