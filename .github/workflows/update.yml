name: 更新数据
on:
  schedule:
    - cron: '0 5 * * *'  # 13:00 北京时间
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: pip install pandas numpy requests
    
    - name: 更新数据
      run: |
        python3 daily_conditions.py
    
    - name: 提交
      run: |
        git config user.name "Bot"
        git config user.email "bot@github.com"
        git add . && git commit -m "自动更新 $(date +'%Y-%m-%d %H:%M')" && git push || echo "No changes"
