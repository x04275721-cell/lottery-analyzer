<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="description" content="彩票号码生成器 - 基于马尔可夫链自定义生成号码">
    <meta name="robots" content="index, follow">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>🎲 号码生成器 - 彩票智能分析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        h1 { text-align: center; font-size: 1.5em; margin-bottom: 5px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: rgba(255,255,255,0.7); margin-bottom: 20px; font-size: 0.85em; }
        
        /* 导航 */
        .nav-menu { display: flex; gap: 8px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .nav-item { padding: 8px 15px; background: rgba(255,255,255,0.1); border-radius: 15px; color: white; text-decoration: none; font-size: 0.85em; transition: all 0.3s; }
        .nav-item:hover, .nav-item.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        
        /* 卡片 */
        .card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .card-title { font-size: 1.1em; margin-bottom: 15px; color: #667eea; }
        
        /* 选择器 */
        .game-select {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .game-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 10px;
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .game-btn.active {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.2);
        }
        .game-btn:hover { background: rgba(255,255,255,0.15); }
        
        /* 滑块 */
        .slider-group { margin-bottom: 15px; }
        .slider-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9em; }
        .slider-label span:last-child { color: #667eea; font-weight: bold; }
        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            cursor: pointer;
        }
        
        /* 号码显示 */
        .number-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .number-ball {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            font-weight: bold;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        
        /* 按钮 */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }
        
        /* 历史 */
        .history-list { display: flex; flex-direction: column; gap: 8px; }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }
        .history-num {
            display: flex;
            gap: 8px;
        }
        .history-ball {
            width: 28px;
            height: 28px;
            background: rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
        }
        .history-score { color: #667eea; font-size: 0.85em; }
        .history-copy {
            padding: 5px 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 0.8em;
            cursor: pointer;
        }
        .history-copy:hover { background: rgba(255,255,255,0.2); }
        
        /* 说明 */
        .info-box {
            background: rgba(251, 191, 36, 0.1);
            border-left: 3px solid #fbbf24;
            padding: 12px;
            border-radius: 0 8px 8px 0;
            font-size: 0.85em;
            color: rgba(255,255,255,0.8);
        }
        
        /* 复制提示 */
        .copy-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1em;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .copy-toast.show { opacity: 1; }
        
        /* 页脚 */
        .footer { text-align: center; color: rgba(255,255,255,0.5); font-size: 0.8em; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 号码生成器</h1>
        <div class="subtitle">基于马尔可夫链 · 自定义生成</div>
        
        <!-- 导航 -->
        <div class="nav-menu">
            <a href="index.html" class="nav-item">📊 今日分析</a>
            <a href="tracking.html" class="nav-item">📈 历史追踪</a>
            <a href="automation.html" class="nav-item">🤖 自动生成</a>
            <a href="generator.html" class="nav-item active">🎲 生成器</a>
        </div>
        
        <!-- 游戏选择 -->
        <div class="card">
            <div class="card-title">选择彩种</div>
            <div class="game-select">
                <button class="game-btn active" onclick="selectGame('pl3')">排列三</button>
                <button class="game-btn" onclick="selectGame('fc3d')">福彩3D</button>
            </div>
        </div>
        
        <!-- 参数设置 -->
        <div class="card">
            <div class="card-title">参数设置</div>
            
            <div class="slider-group">
                <div class="slider-label">
                    <span>马尔可夫权重</span>
                    <span id="markovValue">70%</span>
                </div>
                <input type="range" id="markovSlider" min="30" max="90" value="70" oninput="updateSlider()">
            </div>
            
            <div class="slider-group">
                <div class="slider-label">
                    <span>生成数量</span>
                    <span id="countValue">5注</span>
                </div>
                <input type="range" id="countSlider" min="1" max="20" value="5" oninput="updateSlider()">
            </div>
        </div>
        
        <!-- 号码显示 -->
        <div class="card">
            <div class="card-title">生成结果</div>
            <div class="number-display" id="numberDisplay">
                <div class="number-ball">-</div>
                <div class="number-ball">-</div>
                <div class="number-ball">-</div>
            </div>
            <button class="btn btn-primary" onclick="generateNumber()">🎲 重新生成</button>
            <button class="btn btn-secondary" onclick="copyCurrent()">📋 复制号码</button>
        </div>
        
        <!-- 历史记录 -->
        <div class="card">
            <div class="card-title">本次生成历史</div>
            <div class="history-list" id="historyList">
                <div style="text-align:center;color:rgba(255,255,255,0.5);padding:20px;">暂无记录</div>
            </div>
            <button class="btn btn-secondary" onclick="clearHistory()">🗑️ 清空历史</button>
        </div>
        
        <!-- 说明 -->
        <div class="info-box">
            💡 <strong>马尔可夫权重</strong>：越高越依赖历史规律，越低越随机。建议70%左右效果最佳。
        </div>
        
        <div class="footer">
            ⚠️ 本工具仅供参考娱乐，投注需谨慎
        </div>
    </div>
    
    <!-- 复制提示 -->
    <div class="copy-toast" id="copyToast">✅ 已复制到剪贴板</div>
    
    <script>
        let currentGame = 'pl3';
        let currentNumber = '';
        let history = [];
        
        // ===== 游戏选择 =====
        function selectGame(game) {
            currentGame = game;
            document.querySelectorAll('.game-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            generateNumber();
        }
        
        // ===== 更新滑块 =====
        function updateSlider() {
            const markov = document.getElementById('markovSlider').value;
            const count = document.getElementById('countSlider').value;
            document.getElementById('markovValue').textContent = markov + '%';
            document.getElementById('countValue').textContent = count + '注';
        }
        
        // ===== 生成号码 =====
        function generateNumber() {
            const markov = document.getElementById('markovSlider').value / 100;
            const balls = document.querySelectorAll('.number-ball');
            
            // 简单模拟马尔可夫链效果
            const numbers = [];
            for (let i = 0; i < 3; i++) {
                // 模拟基于概率的生成
                let num;
                if (Math.random() < markov) {
                    // 马尔可夫模式：偏好某些数字
                    const weights = [1.5, 1.0, 1.2, 0.8, 1.3, 1.1, 0.9, 1.4, 1.0, 1.2];
                    const pool = [];
                    for (let j = 0; j < 10; j++) {
                        for (let k = 0; k < weights[j] * 10; k++) {
                            pool.push(j);
                        }
                    }
                    num = pool[Math.floor(Math.random() * pool.length)];
                } else {
                    num = Math.floor(Math.random() * 10);
                }
                numbers.push(num);
            }
            
            currentNumber = numbers.join('');
            
            // 动画显示
            balls.forEach((ball, i) => {
                ball.style.animation = 'none';
                ball.offsetHeight; // 触发重排
                ball.style.animation = 'fadeIn 0.5s ease';
                ball.textContent = numbers[i];
            });
            
            // 添加历史
            addToHistory(numbers.join(''));
        }
        
        // ===== 添加历史 =====
        function addToHistory(num) {
            history.unshift({ num: num, time: new Date().toLocaleTimeString() });
            if (history.length > 20) history.pop();
            renderHistory();
        }
        
        // ===== 渲染历史 =====
        function renderHistory() {
            const list = document.getElementById('historyList');
            if (history.length === 0) {
                list.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.5);padding:20px;">暂无记录</div>';
                return;
            }
            
            list.innerHTML = history.map((item, i) => `
                <div class="history-item">
                    <div class="history-num">
                        ${item.num.split('').map(n => `<div class="history-ball">${n}</div>`).join('')}
                    </div>
                    <div class="history-score">${item.time}</div>
                    <button class="history-copy" onclick="copyNumber('${item.num}')">复制</button>
                </div>
            `).join('');
        }
        
        // ===== 复制号码 =====
        function copyNumber(num) {
            navigator.clipboard.writeText(num).then(showToast);
        }
        
        function copyCurrent() {
            if (currentNumber) {
                navigator.clipboard.writeText(currentNumber).then(showToast);
            }
        }
        
        function showToast() {
            const toast = document.getElementById('copyToast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }
        
        // ===== 清空历史 =====
        function clearHistory() {
            history = [];
            renderHistory();
        }
        
        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', generateNumber);
    </script>
</body>
</html>
