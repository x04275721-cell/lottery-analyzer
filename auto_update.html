<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>彩票分析系统 - 每日自动更新</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 1.8em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-bottom: 20px;
        }
        
        /* 状态卡片 */
        .status-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .status-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .status-text {
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        .status-time {
            color: rgba(255,255,255,0.6);
            font-size: 0.9em;
        }
        
        /* 按钮样式 */
        .btn-container {
            text-align: center;
            margin: 30px 0;
        }
        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-success {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: white;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 结果展示 */
        .result-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: none; /* 默认隐藏 */
        }
        .result-card.show {
            display: block;
        }
        .result-title {
            font-size: 1.2em;
            color: #667eea;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .result-number {
            font-size: 2em;
            font-weight: bold;
            text-align: center;
            margin: 15px 0;
        }
        .number-highlight {
            color: #fbbf24;
        }
        
        /* 锁定标识 */
        .lock-badge {
            display: inline-block;
            padding: 5px 10px;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            border-radius: 20px;
            font-size: 0.8em;
            margin-left: 10px;
        }
        
        /* 导航 */
        .nav-menu {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .nav-item {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }
        .nav-item:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        /* 信息提示 */
        .info-box {
            background: rgba(251, 191, 36, 0.2);
            border-left: 3px solid #fbbf24;
            padding: 10px 15px;
            border-radius: 0 8px 8px 0;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 彩票分析系统</h1>
        <div class="subtitle">每日自动更新 · 下午18:00生成</div>
        
        <!-- 导航 -->
        <div class="nav-menu">
            <a href="index.html" class="nav-item">📊 今日分析</a>
            <a href="tracking.html" class="nav-item">📈 回溯系统</a>
        </div>
        
        <!-- 状态显示 -->
        <div class="status-card" id="statusCard">
            <div class="status-icon" id="statusIcon">⏳</div>
            <div class="status-text" id="statusText">正在检查今日推荐状态...</div>
            <div class="status-time" id="statusTime"></div>
        </div>
        
        <!-- 操作按钮 -->
        <div class="btn-container">
            <button class="btn btn-primary" id="generateBtn" onclick="generateResult()">
                🔄 生成今日推荐
            </button>
            <button class="btn btn-success" id="viewBtn" onclick="viewResult()" style="display:none;">
                👁️ 查看结果
            </button>
        </div>
        
        <!-- 结果展示区域 -->
        <div class="result-card" id="resultCard">
            <div class="result-title">
                📅 排列三今日推荐
                <span class="lock-badge" id="pl3Lock">🔒 已锁定</span>
            </div>
            <div class="info-box">
                <strong>试机号：</strong><span class="number-highlight" id="pl3Test">---</span>
                <strong>开机号：</strong><span class="number-highlight" id="pl3Boot">---</span>
            </div>
            <div class="result-number" id="pl3Selected">---, ---</div>
            <div style="text-align: center; color: rgba(255,255,255,0.6);">
                和值范围：<span id="pl3KeySum">---</span>
            </div>
        </div>
        
        <div class="result-card" id="resultCard2">
            <div class="result-title">
                📅 福彩3D今日推荐
                <span class="lock-badge" id="fc3dLock">🔒 已锁定</span>
            </div>
            <div class="info-box">
                <strong>试机号：</strong><span class="number-highlight" id="fc3dTest">---</span>
                <strong>开机号：</strong><span class="number-highlight" id="fc3dBoot">---</span>
            </div>
            <div class="result-number" id="fc3dSelected">---, ---</div>
            <div style="text-align: center; color: rgba(255,255,255,0.6);">
                和值范围：<span id="fc3dKeySum">---</span>
            </div>
        </div>
        
        <!-- 说明 -->
        <div class="info-box" style="margin-top: 30px;">
            <strong>📌 说明：</strong><br>
            • 每天下午18:00自动生成推荐<br>
            • 点击"生成今日推荐"可手动更新<br>
            • 结果生成后所有人看到相同内容<br>
            • 锁定后不可修改，确保公平
        </div>
    </div>
    
    <script>
        // 检查今日结果状态
        async function checkStatus() {
            try {
                const response = await fetch('today_result.json?t=' + Date.now());
                if (response.ok) {
                    const data = await response.json();
                    showResult(data);
                    updateStatus('success', '✅ 今日推荐已生成', data.generated_at);
                } else {
                    updateStatus('pending', '⏳ 今日推荐待生成', '请在下午18:00后查看');
                }
            } catch (error) {
                updateStatus('pending', '⏳ 今日推荐待生成', '点击下方按钮手动生成');
            }
        }
        
        // 更新状态显示
        function updateStatus(type, text, time) {
            const icon = document.getElementById('statusIcon');
            const textEl = document.getElementById('statusText');
            const timeEl = document.getElementById('statusTime');
            
            if (type === 'success') {
                icon.textContent = '✅';
            } else if (type === 'pending') {
                icon.textContent = '⏳';
            } else if (type === 'generating') {
                icon.textContent = '🔄';
            }
            
            textEl.textContent = text;
            timeEl.textContent = time;
        }
        
        // 生成结果
        async function generateResult() {
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 正在生成...';
            updateStatus('generating', '正在生成推荐，请稍候...', '');
            
            // 模拟生成过程（实际需要调用后端API）
            setTimeout(() => {
                const result = {
                    date: new Date().toISOString().split('T')[0],
                    period: '2026081',
                    pl3: {
                        test: '631',
                        boot: '061',
                        key_sum: [8, 10, 13, 15, 17],
                        selected_2: ['715', '170'],
                        base_10: ['715', '170', '314', '634', '544', '852', '629', '640', '445', '618']
                    },
                    fc3d: {
                        test: '730',
                        boot: '301',
                        key_sum: [9, 11, 13, 16, 18],
                        selected_2: ['234', '583'],
                        base_10: ['234', '583', '450', '925', '515', '378', '630', '407', '646', '909']
                    },
                    generated_at: new Date().toISOString(),
                    locked: true
                };
                
                showResult(result);
                updateStatus('success', '✅ 推荐生成成功', new Date().toLocaleString());
                btn.textContent = '✅ 已生成';
                
                // 显示查看按钮
                document.getElementById('viewBtn').style.display = 'inline-block';
            }, 2000);
        }
        
        // 显示结果
        function showResult(data) {
            // 排列三
            document.getElementById('pl3Test').textContent = data.pl3.test;
            document.getElementById('pl3Boot').textContent = data.pl3.boot;
            document.getElementById('pl3Selected').textContent = data.pl3.selected_2.join(', ');
            document.getElementById('pl3KeySum').textContent = data.pl3.key_sum.join(', ');
            
            // 福彩3D
            document.getElementById('fc3dTest').textContent = data.fc3d.test;
            document.getElementById('fc3dBoot').textContent = data.fc3d.boot;
            document.getElementById('fc3dSelected').textContent = data.fc3d.selected_2.join(', ');
            document.getElementById('fc3dKeySum').textContent = data.fc3d.key_sum.join(', ');
            
            // 显示结果卡片
            document.getElementById('resultCard').classList.add('show');
            document.getElementById('resultCard2').classList.add('show');
            
            // 锁定标识
            if (data.locked) {
                document.getElementById('pl3Lock').style.display = 'inline-block';
                document.getElementById('fc3dLock').style.display = 'inline-block';
            }
        }
        
        // 查看结果详情
        function viewResult() {
            window.location.href = 'index.html';
        }
        
        // 页面加载时检查状态
        window.onload = function() {
            checkStatus();
        };
    </script>
</body>
</html>
