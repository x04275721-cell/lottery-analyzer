<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>📈 回溯系统 - 彩票分析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 15px; }
        h1 {
            text-align: center;
            font-size: 1.6em;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; color: rgba(255,255,255,0.7); margin-bottom: 20px; font-size: 0.9em; }
        
        /* 导航 */
        .nav-menu { display: flex; gap: 8px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .nav-item { padding: 8px 15px; background: rgba(255,255,255,0.1); border-radius: 15px; color: white; text-decoration: none; font-size: 0.85em; transition: all 0.3s; }
        .nav-item:hover, .nav-item.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        
        /* 卡片 */
        .card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .card-title { font-size: 1.1em; margin-bottom: 12px; color: #667eea; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }
        
        /* 加载状态 */
        .loading { text-align: center; padding: 30px; color: rgba(255,255,255,0.6); }
        .loading-spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 错误提示 */
        .error-box { background: rgba(248,113,113,0.2); border: 1px solid #f87171; border-radius: 10px; padding: 15px; margin: 15px 0; }
        .error-box h3 { color: #f87171; margin-bottom: 10px; }
        .retry-btn { background: #f87171; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; margin-top: 10px; }
        .retry-btn:hover { background: #ef4444; }
        
        /* 表格 */
        .data-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .data-table th, .data-table td { padding: 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .data-table th { background: rgba(102, 126, 234, 0.2); color: #667eea; font-size: 0.9em; }
        .data-table td { font-size: 0.85em; }
        
        /* 号码显示 */
        .number-display { display: flex; gap: 5px; justify-content: center; }
        .number-ball { width: 28px; height: 28px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9em; }
        
        /* 状态标签 */
        .status-tag { padding: 3px 10px; border-radius: 12px; font-size: 0.8em; font-weight: bold; }
        .status-hit { background: rgba(74,222,128,0.3); color: #4ade80; }
        .status-miss { background: rgba(248,113,113,0.3); color: #f87171; }
        .status-pending { background: rgba(251,191,36,0.3); color: #fbbf24; }
        
        /* 统计卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin: 15px 0; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 12px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 0.75em; color: rgba(255,255,255,0.6); margin-bottom: 5px; }
        .stat-value { font-size: 1.3em; font-weight: bold; color: #667eea; }
        .stat-value.green { color: #4ade80; }
        .stat-value.red { color: #f87171; }
        
        /* 刷新按钮 */
        .refresh-btn { float: right; background: rgba(102,126,234,0.2); border: 1px solid #667eea; color: #667eea; padding: 5px 15px; border-radius: 15px; cursor: pointer; font-size: 0.85em; }
        .refresh-btn:hover { background: #667eea; color: white; }
        
        /* 最后更新时间 */
        .update-time { text-align: center; color: rgba(255,255,255,0.5); font-size: 0.75em; margin-top: 10px; }
        
        /* 页脚 */
        .footer { text-align: center; color: rgba(255,255,255,0.5); font-size: 0.75em; margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 彩票回溯系统</h1>
        <div class="subtitle">历史查询 · 推荐对比 · 战绩统计</div>

        <!-- 导航菜单 -->
        <div class="nav-menu">
            <a href="index.html" class="nav-item">📊 今日分析</a>
            <a href="tracking.html" class="nav-item active">📈 回溯系统</a>
            <a href="automation.html" class="nav-item">🤖 自动生成</a>
        </div>

        <!-- 战绩统计 -->
        <div class="card">
            <div class="card-title">
                📊 战绩统计
                <button class="refresh-btn" onclick="refreshData()">🔄 刷新</button>
            </div>
            <div id="statsContainer" class="stats-grid">
                <div class="loading"><div class="loading-spinner"></div></div>
            </div>
            <div class="update-time" id="updateTime">加载中...</div>
        </div>

        <!-- 历史推荐记录 -->
        <div class="card">
            <div class="card-title">📅 历史推荐记录</div>
            <div id="historyContainer">
                <div class="loading"><div class="loading-spinner"></div><p style="margin-top:10px;">正在加载数据...</p></div>
            </div>
        </div>

        <!-- 最近开奖记录 -->
        <div class="card">
            <div class="card-title">🎱 排列三最近开奖</div>
            <div id="pl3DrawContainer">
                <div class="loading"><div class="loading-spinner"></div></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🎱 福彩3D最近开奖</div>
            <div id="fc3dDrawContainer">
                <div class="loading"><div class="loading-spinner"></div></div>
            </div>
        </div>

        <div class="footer">
            ⚠️ 彩票有风险，投注需谨慎
        </div>
    </div>

    <script>
        // ========== 数据管理 ==========
        let historyData = [];
        let lastUpdateTime = null;

        // 加载推荐记录
        async function loadHistoryData() {
            try {
                const response = await fetch('history_records.json?t=' + Date.now());
                if (!response.ok) throw new Error('数据加载失败');
                
                historyData = await response.json();
                lastUpdateTime = new Date();
                
                renderHistoryTable();
                calculateStats();
                showUpdateTime();
                
            } catch (error) {
                console.error('加载失败:', error);
                showError('historyContainer', '数据加载失败，请检查网络连接');
            }
        }

        // 渲染历史表格
        function renderHistoryTable() {
            const container = document.getElementById('historyContainer');
            
            if (!historyData || historyData.length === 0) {
                container.innerHTML = '<div class="error-box"><p>暂无历史记录</p></div>';
                return;
            }

            let html = `<table class="data-table">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>期号</th>
                        <th>彩种</th>
                        <th>推荐号码</th>
                        <th>开奖结果</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody>`;

            historyData.forEach(item => {
                const statusClass = item.status === '直中' ? 'status-hit' : 
                                   item.status === '组中' ? 'status-hit' : 
                                   item.status === '未中' ? 'status-miss' : 'status-pending';
                
                html += `<tr>
                    <td>${item.date || '-'}</td>
                    <td>${item.period || '-'}</td>
                    <td>${item.game || '-'}</td>
                    <td><strong style="color:#4ade80;">${item.rec || item.recommendation || '-'}</strong></td>
                    <td>${renderNumberBalls(item.result)}</td>
                    <td><span class="status-tag ${statusClass}">${item.status || '待定'}</span></td>
                </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // 渲染号码球
        function renderNumberBalls(result) {
            if (!result || result === '待开奖') {
                return '<span style="color:#fbbf24;">待开奖</span>';
            }
            
            const numbers = result.toString().split('');
            if (numbers.length !== 3) {
                return `<span style="color:#f87171;">${result}</span>`;
            }
            
            return `<div class="number-display">
                ${numbers.map(n => `<div class="number-ball">${n}</div>`).join('')}
            </div>`;
        }

        // 计算统计
        function calculateStats() {
            const container = document.getElementById('statsContainer');
            
            if (!historyData || historyData.length === 0) {
                container.innerHTML = '<p style="text-align:center;">暂无数据</p>';
                return;
            }

            const total = historyData.length;
            const directHits = historyData.filter(r => r.status === '直中').length;
            const groupHits = historyData.filter(r => r.status === '组中').length;
            const hitRate = total > 0 ? ((directHits + groupHits) / total * 100).toFixed(1) : 0;

            // 按彩种统计
            const pl3Records = historyData.filter(r => r.game === '排列三');
            const fc3dRecords = historyData.filter(r => r.game === '福彩3D');

            container.innerHTML = `
                <div class="stat-box">
                    <div class="stat-label">总期数</div>
                    <div class="stat-value">${total}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">直中</div>
                    <div class="stat-value green">${directHits}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">组中</div>
                    <div class="stat-value green">${groupHits}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">命中率</div>
                    <div class="stat-value ${hitRate >= 30 ? 'green' : hitRate >= 15 ? '' : 'red'}">${hitRate}%</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">排列三</div>
                    <div class="stat-value">${pl3Records.length}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">3D</div>
                    <div class="stat-value">${fc3dRecords.length}</div>
                </div>
            `;
        }

        // 显示更新时间
        function showUpdateTime() {
            const el = document.getElementById('updateTime');
            if (lastUpdateTime) {
                el.textContent = '最后更新：' + lastUpdateTime.toLocaleString('zh-CN');
            }
        }

        // 显示错误
        function showError(containerId, message) {
            const container = document.getElementById(containerId);
            container.innerHTML = `
                <div class="error-box">
                    <h3>⚠️ ${message}</h3>
                    <button class="retry-btn" onclick="refreshData()">重新加载</button>
                </div>
            `;
        }

        // 刷新数据
        async function refreshData() {
            // 显示加载状态
            document.getElementById('historyContainer').innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>正在刷新...</p></div>';
            document.getElementById('statsContainer').innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';
            
            await loadHistoryData();
            await loadDrawResults();
        }

        // 加载开奖结果（模拟）
        async function loadDrawResults() {
            // 这里可以接入真实API
            const pl3Container = document.getElementById('pl3DrawContainer');
            const fc3dContainer = document.getElementById('fc3dDrawContainer');

            // 从本地CSV数据模拟
            pl3Container.innerHTML = `<table class="data-table">
                <thead><tr><th>期号</th><th>开奖号码</th><th>和值</th><th>跨度</th></tr></thead>
                <tbody>
                    <tr><td>2026081</td><td>${renderNumberBalls('690')}</td><td>15</td><td>9</td></tr>
                    <tr><td>2026080</td><td>${renderNumberBalls('770')}</td><td>14</td><td>7</td></tr>
                    <tr><td>2026079</td><td>${renderNumberBalls('195')}</td><td>15</td><td>8</td></tr>
                </tbody>
            </table>`;

            fc3dContainer.innerHTML = `<table class="data-table">
                <thead><tr><th>期号</th><th>开奖号码</th><th>和值</th><th>跨度</th></tr></thead>
                <tbody>
                    <tr><td>2026081</td><td>${renderNumberBalls('827')}</td><td>17</td><td>6</td></tr>
                    <tr><td>2026080</td><td>${renderNumberBalls('802')}</td><td>10</td><td>8</td></tr>
                    <tr><td>2026079</td><td>${renderNumberBalls('233')}</td><td>8</td><td>1</td></tr>
                </tbody>
            </table>`;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('页面加载完成，开始获取数据...');
            await loadHistoryData();
            await loadDrawResults();
        });
    </script>
</body>
</html>
