<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="description" content="彩票智能分析系统 - 历史回溯追踪，查看往期推荐与开奖结果对比">
    <meta name="keywords" content="彩票,排列三,3D,历史记录,回溯追踪">
    <meta name="robots" content="index, follow">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>📈 历史追踪 - 彩票智能分析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 15px; }
        
        h1 { text-align: center; font-size: 1.5em; margin-bottom: 5px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: rgba(255,255,255,0.7); margin-bottom: 15px; font-size: 0.8em; }
        
        /* 导航 */
        .nav-menu { display: flex; gap: 8px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap; }
        .nav-item { padding: 8px 15px; background: rgba(255,255,255,0.1); border-radius: 15px; color: white; text-decoration: none; font-size: 0.85em; transition: all 0.3s; }
        .nav-item:hover, .nav-item.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        .stat-value { font-size: 1.3em; font-weight: bold; }
        .stat-value.hit { color: #4ade80; }
        .stat-value.miss { color: #f87171; }
        .stat-value.neutral { color: #667eea; }
        .stat-label { font-size: 0.7em; color: rgba(255,255,255,0.6); margin-top: 3px; }
        
        /* 筛选 */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid transparent;
            border-radius: 20px;
            color: white;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn.active {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.3);
        }
        .filter-btn:hover { background: rgba(255,255,255,0.15); }
        
        /* 历史列表 */
        .history-list { display: flex; flex-direction: column; gap: 10px; }
        .history-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            border-left: 4px solid #667eea;
            transition: all 0.2s;
        }
        .history-card:hover { background: rgba(255,255,255,0.08); }
        .history-card.hit { border-left-color: #4ade80; background: rgba(74, 222, 128, 0.1); }
        .history-card.miss { border-left-color: #f87171; }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .history-period {
            font-weight: bold;
            color: #667eea;
        }
        .history-date { font-size: 0.8em; color: rgba(255,255,255,0.6); }
        
        .history-status {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .status-hit { background: rgba(74, 222, 128, 0.3); color: #4ade80; }
        .status-miss { background: rgba(248, 113, 113, 0.3); color: #f87171; }
        .status-pending { background: rgba(251, 191, 36, 0.3); color: #fbbf24; }
        
        .history-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .history-numbers { display: flex; gap: 15px; }
        .history-game { font-size: 0.85em; }
        .history-game-label { color: rgba(255,255,255,0.6); margin-bottom: 3px; }
        .history-num-display {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .num-ball {
            width: 28px;
            height: 28px;
            background: rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
        }
        .num-arrow { color: rgba(255,255,255,0.5); }
        .result-ball { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .result-ball.hit { background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%); }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: rgba(255,255,255,0.5);
        }
        .empty-icon { font-size: 4em; margin-bottom: 15px; }
        
        /* 刷新按钮 */
        .refresh-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        .refresh-btn:hover { background: rgba(255,255,255,0.15); }
        
        /* 页脚 */
        .footer { text-align: center; color: rgba(255,255,255,0.5); font-size: 0.8em; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        
        /* 移动端 */
        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .history-content { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 历史追踪</h1>
        <div class="subtitle">查看往期推荐与开奖结果对比</div>
        
        <!-- 导航 -->
        <div class="nav-menu">
            <a href="index.html" class="nav-item">📊 今日分析</a>
            <a href="tracking.html" class="nav-item active">📈 历史追踪</a>
            <a href="automation.html" class="nav-item">🤖 自动生成</a>
            <a href="generator.html" class="nav-item">🎲 生成器</a>
        </div>
        
        <!-- 刷新 -->
        <button class="refresh-btn" onclick="loadHistory()">🔄 刷新历史记录</button>
        
        <!-- 统计 -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value neutral" id="totalCount">--</div>
                <div class="stat-label">总期数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value hit" id="hitCount">--</div>
                <div class="stat-label">命中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value miss" id="missCount">--</div>
                <div class="stat-label">未中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value neutral" id="hitRate">--%</div>
                <div class="stat-label">命中率</div>
            </div>
        </div>
        
        <!-- 筛选 -->
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterHistory('all')">全部</button>
            <button class="filter-btn" onclick="filterHistory('hit')">仅看命中</button>
            <button class="filter-btn" onclick="filterHistory('miss')">仅看未中</button>
            <button class="filter-btn" onclick="filterHistory('pl3')">排列三</button>
            <button class="filter-btn" onclick="filterHistory('fc3d')">3D</button>
        </div>
        
        <!-- 历史列表 -->
        <div class="history-list" id="historyList">
            <div class="empty-state">
                <div class="empty-icon">📭</div>
                <div>暂无历史记录</div>
                <div style="font-size:0.85em;margin-top:5px;">开奖后将自动记录</div>
            </div>
        </div>
        
        <div class="footer">
            ⚠️ 彩票有风险，投注需谨慎！<br>
            本系统仅供学习研究，不构成投注建议
        </div>
    </div>
    
    <script>
        let allHistory = [];
        let currentFilter = 'all';
        
        // ===== 加载历史 =====
        async function loadHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div>加载中...</div></div>';
            
            try {
                const response = await fetch('history_records.json?_t=' + Date.now());
                if (!response.ok) throw new Error('加载失败');
                
                allHistory = await response.json();
                updateStats();
                renderHistory();
            } catch (error) {
                console.error('加载失败:', error);
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><div>加载失败</div></div>';
            }
        }
        
        // ===== 更新统计 =====
        function updateStats() {
            const total = allHistory.length;
            const hits = allHistory.filter(h => h.status === '直中' || h.status === '组中').length;
            const misses = allHistory.filter(h => h.status === '未中').length;
            const rate = total > 0 ? ((hits / total) * 100).toFixed(1) : 0;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('hitCount').textContent = hits;
            document.getElementById('missCount').textContent = misses;
            document.getElementById('hitRate').textContent = rate + '%';
        }
        
        // ===== 筛选 =====
        function filterHistory(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderHistory();
        }
        
        // ===== 渲染历史 =====
        function renderHistory() {
            const list = document.getElementById('historyList');
            
            let filtered = allHistory;
            if (currentFilter === 'hit') {
                filtered = allHistory.filter(h => h.status === '直中' || h.status === '组中');
            } else if (currentFilter === 'miss') {
                filtered = allHistory.filter(h => h.status === '未中');
            } else if (currentFilter === 'pl3') {
                filtered = allHistory.filter(h => h.game === '排列三');
            } else if (currentFilter === 'fc3d') {
                filtered = allHistory.filter(h => h.game === '3D');
            }
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div>暂无符合条件的记录</div></div>';
                return;
            }
            
            // 按日期倒序
            filtered.sort((a, b) => {
                const dateA = new Date(a.date + 'T00:00:00');
                const dateB = new Date(b.date + 'T00:00:00');
                return dateB - dateA;
            });
            
            list.innerHTML = filtered.map(h => {
                const isHit = h.status === '直中' || h.status === '组中';
                const cardClass = h.status === '待开奖' ? '' : (isHit ? 'hit' : 'miss');
                const statusClass = h.status === '待开奖' ? 'status-pending' : (isHit ? 'status-hit' : 'status-miss');
                const resultClass = isHit ? 'hit' : '';
                
                return `
                    <div class="history-card ${cardClass}">
                        <div class="history-header">
                            <div>
                                <div class="history-period">第${h.period}期 · ${h.game}</div>
                                <div class="history-date">${h.date}</div>
                            </div>
                            <div class="history-status ${statusClass}">${h.status}</div>
                        </div>
                        <div class="history-content">
                            <div class="history-numbers">
                                <div class="history-game">
                                    <div class="history-game-label">推荐</div>
                                    <div class="history-num-display">
                                        ${h.recommendation.split(',').map(n => `<div class="num-ball">${n}</div>`).join('')}
                                    </div>
                                </div>
                                <div class="num-arrow">→</div>
                                <div class="history-game">
                                    <div class="history-game-label">开奖</div>
                                    <div class="history-num-display">
                                        ${h.result.split('').map(n => `<div class="num-ball result-ball ${resultClass}">${n}</div>`).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>
</html>
